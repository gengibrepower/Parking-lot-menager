<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Intelligent Parking</title>
    <link rel="stylesheet" href="../css/login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>

    
    <div class="container">
        <form id="formulario-cadastro" action="pagina.html" method="get">
            <h1>CADASTRO</h1>

            <div class="login-box">
                <input id="nome" placeholder="Nome Completo" type="text" required>
                <i class="bx bxs-user-detail"></i>
            </div>

            <div class="login-box">
                <input id="email" placeholder="E-mail" type="email" required>
                <i class="bx bxs-envelope"></i>
            </div>

            <div class="login-box">
                <input id="cpf" placeholder="CPF" type="text" required>
                <i class="bx bxs-id-card"></i>
            </div>

            <div class="login-box">
                <input id="senha" placeholder="Senha" type="password" required>
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="login-box">
                <input id="confirmaSenha" placeholder="Confirmar Senha" type="password" required>
                <i class="bx bxs-lock"></i>
            </div>

            <div class="account-type" style="display: flex; justify-content: space-around; margin: -5px 0 25px 0; font-size: 14px; color: var(--text-main);">
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="radio" name="tipoConta" value="Usuário Comum" id="tipoUser" checked> Usuário
                </label>
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="radio" name="tipoConta" value="Administrador" id="tipoAdmin"> Administrador
                </label>
            </div>

            <button id="btn-cadastrar" type="button" class="login" style="margin-top: 5px;">Cadastrar</button>

            <p class="not-account">
                Já tem conta? <a href="login.html">Faça login</a>
            </p>
        </form>
    </div>
</body>
<script src="../js/login.js"></script>
</html>
